coverage:
  precision: 2
  round: down
  range: "60...100"
  status:
    project:
      default:
        target: auto
        threshold: 1%
      python:
        flags: 
          - python
        target: auto
        threshold: 1%
      rust:
        flags: 
          - rust
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 1%

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false
  require_base: no
  require_head: no

ignore:
  - "tests/**/*"
  - "docs/**/*"
  # perf_event_open(2) syscall plumbing. CI sandboxes deny the syscall, so
  # these paths can't be exercised from GitHub Actions. The pure logic that
  # consumes the syscall's output lives in src/perf/mod.rs and IS covered.
  - "src/perf/syscall.rs"

flags:
  python:
    paths:
      - python/
    carryforward: true
  rust:
    paths:
      - src/
    carryforward: true